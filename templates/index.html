<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Project - Message Board</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        /* ✅ VERSION BANNER — this is the proof CI/CD worked */
        .version-banner {
            background: linear-gradient(90deg, #00c851, #007e33);
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #ffffff;
        }

        .subtitle {
            color: #888;
            font-size: 13px;
            margin-bottom: 30px;
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #00c851;
        }

        button {
            padding: 12px 24px;
            background: #00c851;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #00a844;
        }

        .messages-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-left: 4px solid #00c851;
            border-radius: 8px;
            padding: 14px 18px;
        }

        .message-text {
            font-size: 15px;
            color: #e0e0e0;
            margin-bottom: 6px;
        }

        .message-time {
            font-size: 12px;
            color: #555;
        }

        .empty-state {
            text-align: center;
            color: #444;
            padding: 40px;
            font-size: 14px;
        }

        .about-link {
            margin-top: 30px;
            text-align: center;
            font-size: 13px;
            color: #555;
        }

        .about-link a {
            color: #00c851;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- ✅ VERSION BANNER — change APP_VERSION in app.py and commit to test pipeline -->
        <div class="version-banner">
            🚀 {{ version }} — Pipeline Test Successful
        </div>

        <h1>📋 Message Board</h1>
        <p class="subtitle">Two-Tier Flask + MySQL on AWS EC2</p>

        <form class="input-area" action="/add" method="POST">
            <input type="text" name="message" placeholder="Type your message here..." required />
            <button type="submit">Add</button>
        </form>

        <div class="messages-list">
            {% if messages %}
                {% for msg, created_at in messages %}
                <div class="message-card">
                    <div class="message-text">{{ msg }}</div>
                    <div class="message-time">{{ created_at }}</div>
                </div>
                {% endfor %}
            {% else %}
                <div class="empty-state">No messages yet. Add one above!</div>
            {% endif %}
        </div>

        <div class="about-link">
            <a href="/about">View /about endpoint →</a>
        </div>

    </div>
</body>
</html>
